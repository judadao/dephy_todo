version: 1
policy:
  source_of_truth: docs/todo.yaml
  rules:
  - Use dephy_todo as the global TODO entry point.
  - Before starting work, add or update the relevant TODO item.
  - When behavior changes, update TODO status in the same change.
  - Keep docs/todo.md as a human-readable summary generated from this file.
items:
- id: global-entrypoint
  area: global
  title: Add global TODO validation, listing, and Markdown rendering commands.
  status: done
- id: repo-render
  area: repo
  title: Render repository Markdown summaries from docs/todo.yaml.
  status: done
- id: status-updates
  area: repo
  title: Support CLI status updates for individual TODO items.
  status: done
- id: align-golden-sample
  area: repo
  title: Align repository layout with dephy_module_golden_sample.
  status: done
  notes: Aligned applicable repo guidance and structure docs for this Python TODO
    module.
- id: global-audit
  area: global
  title: Add a global audit command that reports repo.json repositories missing docs/todo.yaml.
  status: done
  notes: Added global-audit and skipped dependency/build output directories during
    repo discovery.
- id: add-agents-doc
  area: repo
  title: Add AGENTS.md with TODO management workflow and validation commands.
  status: done
  notes: Added AGENTS.md with workflow and validation guidance.
- id: module-structure-doc
  area: repo
  title: Add docs/module_structure.md describing CLI, schema, tests, and generated
    outputs.
  status: done
  notes: Added docs/module_structure.md for CLI and discovery structure.
- id: json-output
  area: integration
  title: Add JSON output for global-list or audit results so automation can consume
    TODO state.
  status: done
  notes: global-list and global-audit support --format json.
- id: scan-performance
  area: performance
  title: Add a regression that global scans skip build output and remain fast on large
    workspaces.
  status: done
  notes: Makefile regression verifies build_out repo.json files are skipped by global
    audit.
- id: routine-local-automation
  area: automation
  title: Add local scripts or third-party-tool wrappers for routine code viewing,
    TODO scanning, and test execution to reduce agent token usage.
  status: done
  notes: Added tools/workspace_routine.sh for local repo status, TODO, test-command,
    and key-file summaries.
- id: local-gpu-routine-acceleration
  area: automation
  title: Add optional local GPU-aware acceleration hooks for routine scans, concurrent
    checks, simple tests, and code indexing with CPU fallback.
  status: done
  notes: Added tools/local_accel_routine.sh with GPU detection, code index summary,
    and CPU fallback concurrent test planning.
- id: cpu-parallel-test-runner
  area: automation
  title: Add a CPU parallel workspace test runner and timing report for routine repo
    tests.
  status: done
  notes: Added tools/parallel_test_runner.sh; measured 10 quick repo tests at 2.40s
    with JOBS=1 and 0.82s with JOBS=12 on this host.
- id: gpu-optional-routine-hook
  area: automation
  title: Add optional GPU routine hook for local accelerated code indexing or analysis
    commands with CPU fallback.
  status: done
  notes: Added tools/gpu_routine_hook.sh; detects local GPU and runs DEPHY_GPU_ROUTINE_CMD
    when provided, with CPU fallback.
- id: refresh-repo-readmes
  area: docs
  title: Refresh all repository READMEs to reflect current module structure, TODO
    workflow, audits, and routine tooling.
  status: done
  notes: Refreshed all repo READMEs and moved long legacy README content to docs/readme_legacy.md
    for large repos.
- id: explain-repo-readmes
  area: docs
  title: Expand repository READMEs with project value, usage flow, and architecture
    principles while keeping long legacy details in docs.
  status: done
  notes: User feedback said the shortened READMEs became harder to understand because
    they lost selling points, usage flow, and implementation principles. Expanded
    all root READMEs with value, normal flow, and implementation model sections
    while keeping long legacy details in docs.
- id: readme-keep-summary-value-usage
  area: docs
  title: Keep project summary, value proposition, and usage steps in root READMEs
    instead of moving them to docs.
  status: done
  notes: Root READMEs should be self-contained enough to explain what each repo is,
    why it matters, and how to use it; docs are only for deeper design, legacy
    material, and extended validation notes. Added consistent Overview, Key Value,
    and How To Use sections to all root READMEs.
